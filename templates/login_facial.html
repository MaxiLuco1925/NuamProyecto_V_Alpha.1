<!DOCTYPE html>
{% load static %}
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    {% csrf_token %}
    <title>Login Facial - NUAM</title>
</head>
<body>
    <div class="container mt-5" style="max-width: 520px;">
        <div class="card p-4 shadow-sm">
            <h3 class="mb-3"><i class="bi bi-person-video2 me-2"></i>Iniciar sesión con tu rostro</h3>

            <div id="alerta" class="alert d-none"></div>

            <div class="mb-3">
                <label for="documento" class="form-label">RUT</label>
                <input type="text" id="documento" class="form-control" placeholder="12345678-9" required>
            </div>

            <div class="text-center mb-3">
                <video id="video" width="360" height="270" autoplay muted style="border-radius: 8px; background:#000;"></video>
                <canvas id="canvas" width="360" height="270" class="d-none"></canvas>
            </div>

            <div class="d-grid gap-2">
                <button id="btnValidar" class="btn btn-primary">
                    <i class="bi bi-shield-check me-2"></i>Validar rostro e ingresar
                </button>
                <a href="{% url 'iniciarSesion' %}" class="btn btn-outline-secondary">
                    Ingresar con contraseña en su lugar
                </a>
            </div>
        </div>
    </div>

    <script src="{% static 'js/facial_capture.js' %}"></script>
    <script>
        iniciarCamara('video');

        document.getElementById('btnValidar').addEventListener('click', async () => {
            const alerta = document.getElementById('alerta');
            const boton = document.getElementById('btnValidar');
            const documento = document.getElementById('documento').value.trim();

            if (!documento) {
                alerta.classList.remove('d-none');
                alerta.classList.add('alert-danger');
                alerta.textContent = "Ingresa tu RUT.";
                return;
            }

            boton.disabled = true;
            boton.innerHTML = 'Validando...';

            try {
                const imagenBase64 = capturarFrame('video', 'canvas');

                const respuesta = await fetch("{% url 'login_facial' %}", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "X-CSRFToken": obtenerCSRFToken(),
                    },
                    body: JSON.stringify({ documento_identidad: documento, imagen: imagenBase64 }),
                });

                const datos = await respuesta.json();

                alerta.classList.remove('d-none', 'alert-success', 'alert-danger');
                if (datos.ok) {
                    alerta.classList.add('alert-success');
                    alerta.textContent = "¡Rostro verificado! Ingresando...";
                    window.location.href = "/" + datos.redirect + "/";
                } else {
                    alerta.classList.add('alert-danger');
                    alerta.textContent = datos.error;
                }
            } catch (err) {
                alerta.classList.remove('d-none');
                alerta.classList.add('alert-danger');
                alerta.textContent = "Error al conectar con el servidor.";
            } finally {
                boton.disabled = false;
                boton.innerHTML = '<i class="bi bi-shield-check me-2"></i>Validar rostro e ingresar';
            }
        });
    </script>
</body>
</html>
