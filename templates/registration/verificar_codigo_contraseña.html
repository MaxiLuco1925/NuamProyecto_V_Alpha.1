<!-- templates/registration/verificar_codigo.html -->
 {% load static%}
 <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
<link rel="stylesheet" href="{% static 'css/verificar_codigo.css' %}">
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header">
                    <h3>Verificar Código</h3>
                </div>
                <div class="card-body">
                    <p>Hemos enviado un código de 6 dígitos a tu email. Ingrésalo a continuación:</p>
                    
                    {% if messages %}
                        {% for message in messages %}
                            <div class="alert alert-{{ message.tags }}">
                                {{ message }}
                            </div>
                        {% endfor %}
                    {% endif %}
                    
                    <form method="POST">
                        {% csrf_token %}
                        <div class="form-group">
                            <label for="codigo">Código de verificación:</label>
                            <input type="text" name="codigo" class="form-control" maxlength="6" required>
                        </div>
                        <button type="submit" class="btn btn-primary">Verificar Código</button>
                    </form>
                    
                    <div class="mt-3">
                        <a href="{% url 'password_reset_form' %}">¿No recibiste el código? Solicitar otro</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
