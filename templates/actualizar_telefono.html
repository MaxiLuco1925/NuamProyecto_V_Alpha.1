<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
<link rel="stylesheet" href="{% static 'css/telefono.css' %}">
</head>
<body>
    <div class="container">
        <div class="card shadow">
            <div class="card-header bg-warning text-white">
                <h4 class="mb-0">
                    <i class="bi bi-envelope"></i> Actualizar Telefono
                </h4>
                <span class="nuam-brand">nuam</span>
            </div>
            <div class="card-body">
                <form method="POST">
                    {% csrf_token %}
                    
                    <div class="mb-3">
                        <label for="id_telefono" class="form-label fw-bold">Nuevo Telefono:</label>
                        <input type="telefono" 
                               name="telefono" 
                               id="id_telefono" 
                               class="form-control form-control-lg" 
                               value="{{ form.telefono.value|default:'' }}"
                               required
                               placeholder="Ingresa tu nuevo numero de telefono">
                        
                        {% if form.telefono.errors %}
                            <div class="text-danger mt-2">
                                {% for error in form.email.errors %}
                                    <small><i class="bi bi-exclamation-triangle"></i> {{ error }}</small>
                                {% endfor %}
                            </div>
                        {% endif %}
                    </div>

                    <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                        <a href="{% url 'Configuración' %}" class="btn btn-secondary me-md-2">
                            <i class="bi bi-arrow-left"></i> Cancelar
                        </a>
                        <button type="submit" class="btn btn-custom">
                            <i class="bi bi-check-lg"></i> Actualizar Telefono
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
